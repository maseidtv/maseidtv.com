        /* Genel Tasarım */
        body {

            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff0000, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        p {
            color: #aaaaaa;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        /* Buton Grubu */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 16px 30px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: block;
        }

        .discord-btn {
            background-color: #5865F2;
            color: white;
        }

        .discord-btn:hover {
            background-color: #4752c4;
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
        }

        .youtube-btn {
            background-color: #ff0000;
            color: white;
        }

        .youtube-btn:hover {
            background-color: #cc0000;
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        /* İletişim Formu Tasarımı */
        .contact-form {
            text-align: left;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
        }

        .contact-form h3 {
            margin-bottom: 20px;
            font-size: 1.4rem;
            color: #fff;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #bbb;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: #ff0000;
        }

        .send-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn:hover {
            background: #ddd;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #555;
        }

        /* Animasyon */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobil Uyumluluk */
        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
